name: Tägliches Preis-Update

on:
  # Cron temporär deaktiviert – manueller Start via workflow_dispatch
  # Reaktivieren: schedule wieder einkommentieren
  # schedule:
  #   - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Modus: update | history | both"
        required: false
        default: "both"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Preis-Update ausführen
        if: ${{ github.event.inputs.mode != 'history' }}
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python sync/tcggo_sync.py --update

      - name: DB nach Update committen (Preise sofort verfügbar)
        if: ${{ github.event.inputs.mode != 'history' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sync/tcggo.db
          git diff --staged --quiet || git commit -m "chore: Preise $(date +'%Y-%m-%d')" && git push

      - name: History-Backfill ausführen (Karten >5€, bis Limit)
        if: ${{ github.event.inputs.mode != 'update' }}
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python sync/tcggo_sync.py --history --min-price=5.0 --days=365

      - name: DB nach History-Backfill committen
        if: ${{ always() && github.event.inputs.mode != 'update' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sync/tcggo.db
          git diff --staged --quiet || git commit -m "chore: History $(date +'%Y-%m-%d')" && git push
