name: Tägliches Preis-Update

on:
  schedule:
    # Jeden Tag um 06:00 UTC (= 07:00 / 08:00 MEZ/MESZ)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Modus: update | history | both"
        required: false
        default: "both"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Preis-Update ausführen
        if: ${{ github.event.inputs.mode != 'history' }}
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python sync/tcggo_sync.py --update

      - name: History-Backfill ausführen (Karten >10€, bis Limit)
        if: ${{ github.event.inputs.mode != 'update' }}
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python sync/tcggo_sync.py --history --min-price=5.0 --days=365

      - name: Datenbank committen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sync/tcggo.db
          git diff --staged --quiet || git commit -m "chore: DB Update $(date +'%Y-%m-%d')"
          git push
